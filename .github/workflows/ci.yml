name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Go dependencies
        run: go mod download

      - name: Install web dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Build web (for Go embed)
        run: mkdir -p web/dist && cd web && npm run build

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          skip-cache: true

      - name: Web lint
        run: cd web && npm run lint

      - name: Go vulnerability audit
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -scan=package ./... || echo "govulncheck found issues (usually Go stdlib false positives)"

      - name: Web dependency audit
        run: cd web && npm audit --audit-level=high

      - name: Test
        run: go test ./... -v

      - name: Secrets scan
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          gitleaks detect --source . --no-git -v

      - name: Build production binary
        run: make build
